<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎵 christineching.com</title>
  <meta name="description" content="A surprise awaits." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0a0a12;
      color: #f5f5f7;
      font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    /* animated party background */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: linear-gradient(120deg,#ff004c,#ffb400,#00d4ff,#7b2ff7,#ff004c);
      background-size: 400% 400%;
      opacity: 0.18;
      animation: party 8s ease infinite;
      z-index: 0;
    }
    @keyframes party {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .stage { position: relative; z-index: 1; padding: 24px; }
    .gif {
      width: min(80vw, 480px);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: block;
      margin: 0 auto 28px;
    }
    h1 {
      font-size: clamp(24px, 6vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(255,0,76,0.5);
    }
    p.sub { font-size: clamp(14px, 3vw, 18px); color: #c8c8d4; }
    /* click-to-start gate */
    #gate {
      position: fixed; inset: 0; z-index: 5;
      background: #0a0a12;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      gap: 16px;
    }
    #gate .big { font-size: clamp(28px, 8vw, 64px); font-weight: 800; }
    #gate .pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
    #player { position: fixed; bottom: 12px; right: 12px; width: 240px; height: 135px; border: 0; border-radius: 10px; z-index: 2; box-shadow: 0 8px 30px rgba(0,0,0,.5); }
    @media (max-width: 520px) { #player { width: 150px; height: 84px; } }
  </style>
</head>
<body>
  <div class="stage" aria-hidden="false">
    <img class="gif"
         src="https://media.tenor.com/x8v1oNUOmg4AAAAC/rickroll-roll.gif"
         alt="Rick Astley dancing"
         onerror="this.onerror=null;this.src='https://media1.giphy.com/media/Ju7l5y9osyymQ/giphy.gif';" />
    <h1>You just got rickrolled 🎶</h1>
    <p class="sub">Never gonna give you up · never gonna let you down</p>
  </div>

  <!-- hidden until click: reliable audio+video source -->
  <iframe id="player" title="now playing" allow="autoplay; encrypted-media" hidden></iframe>

  <div id="gate">
    <div class="big pulse">▶︎ Click anywhere</div>
    <div style="color:#9a9ab0;font-size:14px;">(turn your sound on)</div>
  </div>

  <script>
    var gate = document.getElementById('gate');
    var player = document.getElementById('player');
    function start() {
      // start the music (with sound — this runs inside a user gesture)
      player.src = "https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0&modestbranding=1";
      player.hidden = false;
      gate.style.display = 'none';
    }
    gate.addEventListener('click', start, { once: true });
    document.addEventListener('keydown', start, { once: true });
  </script>
</body>
</html>
